name: Sync Upstream

on:
  schedule:
    # GitHub Actions 使用 UTC 时间；这里是北京时间每天 07:00。
    - cron: "0 23 * * *"
  workflow_dispatch:

concurrency:
  group: sync-upstream-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync fork with upstream
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            --method POST \
            repos/${{ github.repository }}/merge-upstream \
            -f branch=${{ github.event.repository.default_branch }}
